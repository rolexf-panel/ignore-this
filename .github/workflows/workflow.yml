name: Firmware Device Tree Extractor

on:
  workflow_dispatch:
    inputs:
      firmware_url:
        description: 'URL Firmware (direct link)'
        required: true
        type: string
      firmware_type:
        description: 'Tipe Firmware'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - boot_img
          - recovery_img
          - full_rom
          - ozip
          - ofp
          - kdz
          - tot
      device_codename:
        description: 'Device Codename (opsional)'
        required: false
        type: string
      target_arch:
        description: 'Arsitektur Target'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - arm64
          - arm
          - x86_64
      ai_model:
        description: 'Model AI untuk Analisis'
        required: true
        default: 'codellama'
        type: choice
        options:
          - codellama
          - deepseek-coder
          - mistral
          - llama3
      telegram_bot_token:
        description: 'Telegram Bot Token (opsional — atau pakai secret TELEGRAM_BOT_TOKEN)'
        required: false
        type: string
      telegram_chat_id:
        description: 'Telegram Chat/Owner ID (opsional — atau pakai secret TELEGRAM_CHAT_ID)'
        required: false
        type: string

jobs:
  extract-and-analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: GitHub Workflow Cleaner Action
        uses: rokibhasansagar/slimhub_actions@v25.42.5

      - name: Setup Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            p7zip-full \
            p7zip-rar \
            unrar \
            unzip \
            binwalk \
            device-tree-compiler \
            abootimg \
            android-sdk-libsparse-utils \
            liblz4-tool \
            lzop \
            xz-utils \
            zstd \
            python3 \
            python3-pip \
            curl \
            wget \
            file \
            xxd \
            bc \
            bison \
            build-essential \
            flex \
            git \
            libssl-dev \
            libelf-dev \
            cpio \
            kmod

      - name: Install Specialized Tools
        run: |
          pip3 install --break-system-packages --quiet protobuf bsdiff4 six
          git clone --depth=1 https://github.com/vm03/payload_dumper.git /opt/payload_dumper

          pip3 install --break-system-packages --quiet pycryptodome
          git clone --depth=1 https://github.com/bkerler/oppo_decrypt.git /opt/oppo_decrypt || true

          git clone --depth=1 https://github.com/ehem/kdztools.git /opt/kdztools
          pip3 install --break-system-packages --quiet -r /opt/kdztools/requirements.txt 2>/dev/null || true

          pip3 install --break-system-packages --quiet requests

      - name: Download Firmware
        id: download
        env:
          FIRMWARE_URL: ${{ github.event.inputs.firmware_url }}
        run: |
          mkdir -p firmware_output
          cd firmware_output

          FIRMWARE_URL="${FIRMWARE_URL}"  # sudah di-set via env block di atas
          echo "Input URL: ${FIRMWARE_URL}"

          # ── Pixeldrain handler ────────────────────────────────────────────────
          # Format yang didukung:
          #   https://pixeldrain.com/u/FILEID
          #   https://pixeldrain.com/u/FILEID#item=SOMETHING  (multi-file list)
          #   https://pixeldrain.com/l/LISTID                 (daftar/album)
          if echo "${FIRMWARE_URL}" | grep -qi "pixeldrain\.com"; then
            echo "Pixeldrain link detected, resolving direct download URL..."

            python3 << 'PYEOF'
          import re, json, sys, os, urllib.request, urllib.error

          url = os.environ.get('FIRMWARE_URL', '')

          # Ekstrak file_id dari /u/FILEID atau /u/FILEID#item=...
          match = re.search(r'pixeldrain\.com/u/([A-Za-z0-9]+)', url)
          if not match:
              # Coba format list /l/LISTID — ambil item pertama via API
              list_match = re.search(r'pixeldrain\.com/l/([A-Za-z0-9]+)', url)
              if list_match:
                  list_id = list_match.group(1)
                  api_url = f"https://pixeldrain.com/api/list/{list_id}"
                  try:
                      req = urllib.request.Request(api_url, headers={"User-Agent": "curl/7.88"})
                      with urllib.request.urlopen(req, timeout=15) as r:
                          data = json.loads(r.read())
                      files = data.get("files", [])
                      if not files:
                          print("ERROR: Pixeldrain list is empty", file=sys.stderr)
                          sys.exit(1)
                      file_id = files[0]["id"]
                      orig_name = files[0].get("name", "firmware.bin")
                      print(f"List mode: picking first file '{orig_name}' (id={file_id})")
                  except Exception as e:
                      print(f"ERROR fetching Pixeldrain list: {e}", file=sys.stderr)
                      sys.exit(1)
              else:
                  print("ERROR: Could not extract Pixeldrain file ID from URL", file=sys.stderr)
                  sys.exit(1)
          else:
              file_id = match.group(1)
              # Ambil nama file asli dari metadata API
              api_info_url = f"https://pixeldrain.com/api/file/{file_id}/info"
              orig_name = "firmware.bin"
              try:
                  req = urllib.request.Request(api_info_url, headers={"User-Agent": "curl/7.88"})
                  with urllib.request.urlopen(req, timeout=15) as r:
                      info = json.loads(r.read())
                  orig_name = info.get("name", "firmware.bin")
                  print(f"Pixeldrain file info: name={orig_name}, size={info.get('size','-')}")
              except Exception as e:
                  print(f"Warning: could not fetch Pixeldrain file info: {e}")

          direct_url = f"https://pixeldrain.com/api/file/{file_id}"
          ext = os.path.splitext(orig_name)[1].lstrip('.').lower() or 'bin'

          # Tulis ke file sementara agar dibaca oleh shell
          with open('/tmp/pd_direct_url', 'w') as f:
              f.write(direct_url)
          with open('/tmp/pd_url_ext', 'w') as f:
              f.write(ext)
          with open('/tmp/pd_orig_name', 'w') as f:
              f.write(orig_name)

          print(f"Direct download URL: {direct_url}")
          print(f"Original filename  : {orig_name}")
          print(f"Extension          : {ext}")
          PYEOF

            FIRMWARE_URL=$(cat /tmp/pd_direct_url)
            PD_URL_EXT=$(cat /tmp/pd_url_ext)
            PD_ORIG_NAME=$(cat /tmp/pd_orig_name)
            echo "Resolved Pixeldrain URL: ${FIRMWARE_URL}"
            echo "Original filename: ${PD_ORIG_NAME}"
          fi
          # ── End Pixeldrain handler ────────────────────────────────────────────

          # Ekstrak ekstensi dari URL (atau dari nama asli Pixeldrain jika tersedia)
          if [ -n "${PD_URL_EXT}" ]; then
            URL_EXT="${PD_URL_EXT}"
          else
            URL_BASENAME=$(basename "${FIRMWARE_URL%%\?*}")
            URL_EXT="${URL_BASENAME##*.}"
            URL_EXT="${URL_EXT,,}"
          fi
          echo "url_extension=${URL_EXT}" >> $GITHUB_OUTPUT
          echo "Detected extension: ${URL_EXT}"

          # Download dengan wget; tambah header untuk Pixeldrain agar tidak kena rate-limit
          wget --progress=bar:force --timeout=600 \
               --header="User-Agent: curl/7.88.1" \
               -O firmware.bin "${FIRMWARE_URL}" 2>&1 || \
          wget --no-check-certificate --timeout=600 \
               -O firmware.bin "${FIRMWARE_URL}"

          FILE_SIZE=$(stat -c%s firmware.bin)
          FILE_TYPE=$(file firmware.bin)

          echo "file_size=${FILE_SIZE}" >> $GITHUB_OUTPUT
          echo "file_type=${FILE_TYPE}" >> $GITHUB_OUTPUT
          echo "Download complete: ${FILE_SIZE} bytes"
          echo "File type: ${FILE_TYPE}"

      - name: Extract Firmware
        id: extract
        run: |
          cd firmware_output
          mkdir -p extracted dtb_files dts_files analysis_results

          FIRMWARE_TYPE="${{ github.event.inputs.firmware_type }}"

          if [ "$FIRMWARE_TYPE" == "auto" ]; then
            FILE_INFO=$(file firmware.bin)
            URL_EXT="${{ steps.download.outputs.url_extension }}"

            if echo "$FILE_INFO" | grep -qi "Android bootimg"; then
              FIRMWARE_TYPE="boot_img"
            elif [[ "$URL_EXT" == "ozip" ]]; then
              FIRMWARE_TYPE="ozip"
            elif [[ "$URL_EXT" == "ofp" ]]; then
              FIRMWARE_TYPE="ofp"
            elif [[ "$URL_EXT" == "kdz" ]]; then
              FIRMWARE_TYPE="kdz"
            elif [[ "$URL_EXT" == "tot" ]]; then
              FIRMWARE_TYPE="tot"
            elif echo "$FILE_INFO" | grep -qi "Android sparse image"; then
              FIRMWARE_TYPE="full_rom"
            else
              FIRMWARE_TYPE="full_rom"
            fi
          fi

          echo "Detected/Selected type: $FIRMWARE_TYPE"

          case $FIRMWARE_TYPE in
            boot_img|recovery_img)
              echo "Extracting boot image..."
              abootimg -x firmware.bin
              if [ -f initrd.img ]; then
                mkdir -p ramdisk && cd ramdisk
                gzip -dc ../initrd.img | cpio -i 2>/dev/null || \
                lz4 -dc ../initrd.img | cpio -i 2>/dev/null || \
                xz -dc ../initrd.img | cpio -i 2>/dev/null || true
                cd ..
              fi
              if [ -f zImage ]; then
                python3 << 'PYEOF'
          import struct, sys
          try:
              with open('zImage', 'rb') as f:
                  data = f.read()
              for magic, endian in [(b'\xd0\x0d\xfe\xed', '>'), (b'\xed\xfe\x0d\xd0', '<')]:
                  pos = 0
                  while True:
                      pos = data.find(magic, pos)
                      if pos == -1:
                          break
                      size = struct.unpack(endian + 'I', data[pos+4:pos+8])[0]
                      if 64 < size < len(data) - pos:
                          out_path = f'extracted/dtb_from_zImage_{hex(pos)}.dtb'
                          with open(out_path, 'wb') as dtb:
                              dtb.write(data[pos:pos+size])
                          print(f"Extracted DTB at offset {hex(pos)}, size {size} -> {out_path}")
                      pos += 1
          except Exception as e:
              print(f"Warning: {e}", file=sys.stderr)
          PYEOF
              fi
              ;;

            full_rom)
              echo "Extracting full ROM..."
              binwalk -eM -C extracted/ firmware.bin 2>/dev/null || \
              7z x firmware.bin -oextracted/ -y

              find extracted/ -name "*.img" -type f | while read img; do
                if file "$img" | grep -qi "Android sparse image"; then
                  echo "Converting sparse image: $img"
                  simg2img "$img" "${img}.raw" && mv "${img}.raw" "$img" || true
                fi
              done
              ;;

            ozip)
              echo "Extracting OZIP..."
              if [ -f /opt/oppo_decrypt/ozip_decrypt.py ]; then
                python3 /opt/oppo_decrypt/ozip_decrypt.py firmware.bin extracted/ 2>/dev/null || \
                7z x firmware.bin -oextracted/ -y
              else
                7z x firmware.bin -oextracted/ -y
              fi
              ;;

            ofp)
              echo "Extracting OFP..."
              if [ -d /opt/oppo_decrypt ]; then
                python3 /opt/oppo_decrypt/ofp_mtk_extract.py firmware.bin extracted/ 2>/dev/null || \
                python3 /opt/oppo_decrypt/ofp_qc_extract.py firmware.bin extracted/ 2>/dev/null || \
                7z x firmware.bin -oextracted/ -y
              else
                7z x firmware.bin -oextracted/ -y
              fi
              ;;

            kdz|tot)
              echo "Extracting KDZ/TOT..."
              python3 /opt/kdztools/undz.py firmware.bin -d extracted/ 2>/dev/null || \
              python3 /opt/kdztools/untot.py firmware.bin -d extracted/ 2>/dev/null || \
              7z x firmware.bin -oextracted/ -y
              ;;
          esac

          echo "Searching for DTB files..."
          find extracted/ -type f \( -name "*.dtb" -o -name "*.dtbo" \) -exec cp {} dtb_files/ \; 2>/dev/null || true

          find extracted/ -type f -size +64c -size -50M | while read bin_file; do
            python3 - "$bin_file" dtb_files/ << 'PYEOF'
          import sys, os, shutil
          src, dst_dir = sys.argv[1], sys.argv[2]
          try:
              with open(src, 'rb') as f:
                  data = f.read(16)
              if data[:4] in (b'\xd0\x0d\xfe\xed', b'\xed\xfe\x0d\xd0'):
                  name = os.path.basename(src) + '.dtb_candidate'
                  shutil.copy2(src, os.path.join(dst_dir, name))
                  print(f"Found DTB signature in: {src}")
          except Exception:
              pass
          PYEOF
          done

          {
            echo "=== Device Info ==="
            echo "Extraction Date: $(date)"
            echo "Firmware Type: $FIRMWARE_TYPE"
            echo "DTB files found:"
            ls dtb_files/ 2>/dev/null || echo "  (none)"
            echo ""
            echo "=== Model strings from extracted files ==="
            strings extracted/* 2>/dev/null | grep -oP 'model=\S+' | sort -u | head -20 || true
          } > device_info.txt

          DTB_COUNT=$(ls dtb_files/ 2>/dev/null | wc -l)
          echo "dtb_count=${DTB_COUNT}" >> $GITHUB_OUTPUT
          echo "Found ${DTB_COUNT} DTB candidate(s)"

      - name: Convert DTB to DTS
        id: convert
        run: |
          cd firmware_output

          if [ ! "$(ls -A dtb_files/ 2>/dev/null)" ]; then
            echo "No DTB files found, skipping conversion."
          fi

          for dtb in dtb_files/*; do
            if [ -f "$dtb" ]; then
              BASENAME=$(basename "$dtb")
              DTS_NAME="dts_files/${BASENAME%.dtb*}.dts"

              echo "Converting: $BASENAME"
              dtc -I dtb -O dts -o "$DTS_NAME" "$dtb" 2>/dev/null && \
                echo "Success: $DTS_NAME" || \
                echo "Failed normal convert: $BASENAME"

              if [ ! -s "$DTS_NAME" ]; then
                dtc -I dtb -O dts -f -o "$DTS_NAME" "$dtb" 2>/dev/null && \
                  echo "Success (force): $DTS_NAME" || true
              fi
            fi
          done

          DTS_COUNT=$(ls dts_files/*.dts 2>/dev/null | wc -l)
          echo "dts_count=${DTS_COUNT}" >> $GITHUB_OUTPUT
          echo "Converted ${DTS_COUNT} DTS file(s)"

      - name: Setup Local AI (Ollama)
        continue-on-error: true
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 10

          if ! curl -sf http://localhost:11434/api/tags > /dev/null; then
            echo "Ollama failed to start"
            exit 1
          fi

          MODEL="${{ github.event.inputs.ai_model }}"
          echo "Pulling AI model: $MODEL"
          timeout 1800 ollama pull "$MODEL" || {
            echo "Fallback to tinyllama..."
            timeout 600 ollama pull tinyllama || true
          }
          ollama list

      - name: AI Analysis & Device Tree Generation
        id: ai_analysis
        continue-on-error: true
        run: |
          cd firmware_output

          cat > ai_prompt.txt << 'PROMPTEOF'
          ROLE: You are an expert Embedded Linux Engineer and Android ROM Developer specializing in Device Tree Source (DTS) analysis and custom ROM development.

          TASK: Analyze the provided Device Tree Source file and generate a comprehensive technical report with actionable recommendations.

          CONTEXT: Device codename "${{ github.event.inputs.device_codename || 'unknown' }}".

          INPUT:
          ===DTS_CONTENT_START===
          {{DTS_CONTENT}}
          ===DTS_CONTENT_END===

          ## 1. DEVICE IDENTIFICATION
          - Extract device model, brand, codename
          - Identify SoC manufacturer and model
          - Determine architecture
          - List kernel version compatibility
          - Identify bootloader requirements

          ## 2. HARDWARE COMPONENTS MAPPING
          - CPU, Memory, Storage, Display, GPU, Camera
          - Audio, Connectivity (WiFi/BT/NFC/GPS)
          - Sensors, Battery, USB, Biometrics

          ## 3. PINMUX & GPIO ANALYSIS
          - Pinctrl configurations, GPIO assignments
          - I2C/SPI/UART buses, IRQ lines

          ## 4. REGULATORS & POWER MANAGEMENT
          - PMIC, voltage regulators, power domains
          - Sleep/wake config, thermal zones

          ## 5. KERNEL COMPATIBILITY
          - Compatible strings, required drivers
          - Mainline availability, out-of-tree requirements

          ## 6. CUSTOM ROM COMPATIBILITY
          - Bootloader unlock status
          - Kernel source / GPL compliance
          - Partition table, AVB, Treble, SELinux
          - GPU/Camera/RIL/Audio/Sensor HAL support
          - Development difficulty: Easy/Medium/Hard

          ## 7. MISSING COMPONENTS
          - Undefined nodes, placeholder nodes, TODOs

          ## 8. RECOMMENDATIONS
          - Immediate Actions (top 3)
          - Required Patches (top 3)
          - Testing Priority (top 3)

          ## 9. QUALITY SCORE (1-10 each)
          - Completeness / Documentation / Standard Compliance / Mainline Potential

          OVERALL CUSTOM ROM VIABILITY: [YES/NO/MAYBE]
          Confidence Level: [HIGH/MEDIUM/LOW]
          Estimated Development Effort: [WEEKS/MONTHS/YEARS]

          ## 10. CONFIG SNIPPETS
          - BoardConfig.mk snippet
          - device.mk snippet
          - Kernel defconfig recommendations
          - recovery.fstab suggestion
          PROMPTEOF

          for dts in dts_files/*.dts; do
            if [ -f "$dts" ]; then
              BASENAME=$(basename "$dts")
              echo "Analyzing: $BASENAME"

              DTS_CONTENT=$(head -n 500 "$dts")
              DTS_ESCAPED=$(echo "$DTS_CONTENT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
              FINAL_PROMPT=$(sed "s|{{DTS_CONTENT}}|${DTS_CONTENT}|" ai_prompt.txt)

              echo "$FINAL_PROMPT" > "analysis_results/${BASENAME}_prompt.txt"

              MODEL="${{ github.event.inputs.ai_model }}"
              RESPONSE=$(timeout 300 curl -sf --max-time 300 http://localhost:11434/api/generate \
                -H "Content-Type: application/json" \
                -d "{
                  \"model\": \"${MODEL}\",
                  \"prompt\": ${DTS_ESCAPED},
                  \"stream\": false,
                  \"options\": {
                    \"temperature\": 0.3,
                    \"num_ctx\": 4096,
                    \"num_predict\": 2048
                  }
                }" 2>/dev/null) || RESPONSE=""

              if [ -n "$RESPONSE" ]; then
                echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(data.get('response', 'No response from model'))
          except Exception as e:
              print(f'Error parsing response: {e}')
          " > "analysis_results/${BASENAME}_analysis.md"
                echo "Analysis saved: analysis_results/${BASENAME}_analysis.md"
              else
                echo "No response from Ollama for $BASENAME" > "analysis_results/${BASENAME}_analysis.md"
              fi

              grep -E "(OVERALL CUSTOM ROM VIABILITY|Confidence Level|Estimated Development Effort)" \
                "analysis_results/${BASENAME}_analysis.md" >> summary_report.txt || true
            fi
          done

          ANALYSIS_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')
          SUMMARY_CONTENT=$(cat summary_report.txt 2>/dev/null || echo "No summary available")
          DTS_FILE_COUNT=$(ls -1 dts_files/*.dts 2>/dev/null | wc -l | tr -d ' ')

          cat > analysis_results/00_MASTER_REPORT.md << MASTEREOF
          # Device Tree Analysis Master Report

          **Firmware URL:** ${{ github.event.inputs.firmware_url }}
          **Device Codename:** ${{ github.event.inputs.device_codename || 'Not specified' }}
          **Analysis Date:** ${ANALYSIS_DATE}
          **AI Model Used:** ${{ github.event.inputs.ai_model }}

          ## Executive Summary
          ${SUMMARY_CONTENT}

          ## Files Analyzed
          ${DTS_FILE_COUNT} DTS files processed

          ## Next Steps
          1. Review individual analysis files in this directory
          2. Check compatibility assessment for custom ROM development
          3. Verify hardware support status
          4. Consult device-specific community resources

          ---
          *Generated by Firmware Device Tree Extractor Workflow*
          MASTEREOF

      - name: Generate Build Configuration Snippets
        run: |
          cd firmware_output
          mkdir -p build_configs

          cat > build_configs/BoardConfigTemplate.mk << 'BOARDEOF'
          # BoardConfig.mk Template - Generated from Device Tree Analysis
          # Device: ${{ github.event.inputs.device_codename || 'unknown' }}

          DEVICE_PATH := device/$(MANUFACTURER)/$(DEVICE)

          TARGET_ARCH := arm64
          TARGET_ARCH_VARIANT := armv8-a
          TARGET_CPU_ABI := arm64-v8a
          TARGET_CPU_ABI2 :=
          TARGET_CPU_VARIANT := generic
          TARGET_CPU_VARIANT_RUNTIME := cortex-a53
          TARGET_2ND_ARCH := arm
          TARGET_2ND_ARCH_VARIANT := armv8-a
          TARGET_2ND_CPU_ABI := armeabi-v7a
          TARGET_2ND_CPU_ABI2 := armeabi
          TARGET_2ND_CPU_VARIANT := generic
          TARGET_2ND_CPU_VARIANT_RUNTIME := cortex-a53

          TARGET_BOOTLOADER_BOARD_NAME := ${{ github.event.inputs.device_codename || 'unknown' }}
          TARGET_NO_BOOTLOADER := false

          TARGET_PREBUILT_KERNEL := $(DEVICE_PATH)/prebuilt/kernel
          BOARD_KERNEL_CMDLINE := console=ttyMSM0,115200n8 androidboot.hardware=qcom
          BOARD_KERNEL_BASE := 0x00000000
          BOARD_KERNEL_PAGESIZE := 4096
          BOARD_KERNEL_OFFSET := 0x00008000
          BOARD_RAMDISK_OFFSET := 0x01000000
          BOARD_SECOND_OFFSET := 0x00f00000
          BOARD_KERNEL_TAGS_OFFSET := 0x00000100
          BOARD_FLASH_BLOCK_SIZE := 262144

          BOARD_INCLUDE_DTB_IN_BOOTIMG := true
          BOARD_DTB_OFFSET := 0x01f00000

          BOARD_BOOTIMAGE_PARTITION_SIZE := 67108864
          BOARD_RECOVERYIMAGE_PARTITION_SIZE := 67108864
          BOARD_SYSTEMIMAGE_PARTITION_SIZE := 3221225472
          BOARD_VENDORIMAGE_PARTITION_SIZE := 1073741824

          BOARD_SYSTEMIMAGE_FILE_SYSTEM_TYPE := ext4
          BOARD_VENDORIMAGE_FILE_SYSTEM_TYPE := ext4
          TARGET_USERIMAGES_USE_EXT4 := true
          TARGET_USERIMAGES_USE_F2FS := true

          TARGET_RECOVERY_FSTAB := $(DEVICE_PATH)/recovery.fstab
          BOARD_HAS_LARGE_FILESYSTEM := true

          BOARD_AVB_ENABLE := true
          BOARD_AVB_MAKE_VBMETA_IMAGE_ARGS += --flags 3

          BOARD_SEPOLICY_DIRS += $(DEVICE_PATH)/sepolicy
          SELINUX_IGNORE_NEVERALLOWS := true
          BOARDEOF

          cat > build_configs/device.mk << 'DEVICEEOF'
          # device.mk Template - Generated from Device Tree Analysis

          $(call inherit-product, $(SRC_TARGET_DIR)/product/core_64_bit.mk)
          $(call inherit-product, $(SRC_TARGET_DIR)/product/full_base_telephony.mk)

          PRODUCT_NAME := lineage_${{ github.event.inputs.device_codename || 'unknown' }}
          PRODUCT_DEVICE := ${{ github.event.inputs.device_codename || 'unknown' }}
          PRODUCT_BRAND := $(MANUFACTURER)
          PRODUCT_MODEL := $(DEVICE_MODEL)
          PRODUCT_MANUFACTURER := $(MANUFACTURER)

          PRODUCT_GMS_CLIENTID_BASE := android-$(MANUFACTURER)

          BUILD_FINGERPRINT := $(MANUFACTURER)/$(DEVICE)/$(DEVICE):$(ANDROID_VERSION)/$(BUILD_ID)/$(DATE):user/release-keys

          PRODUCT_BUILD_PROP_OVERRIDES += \
              PRIVATE_BUILD_DESC="$(DEVICE)-user $(ANDROID_VERSION) $(BUILD_ID) $(DATE) release-keys"

          $(call inherit-product-if-exists, vendor/$(MANUFACTURER)/$(DEVICE)/$(DEVICE)-vendor.mk)
          DEVICEEOF

      - name: Create Final Archive
        run: |
          cd firmware_output
          ARCHIVE_NAME="device_tree_analysis_$(date +%Y%m%d_%H%M%S)"
          touch device_info.txt

          zip -r "../${ARCHIVE_NAME}.zip" \
            extracted/ dtb_files/ dts_files/ analysis_results/ build_configs/ device_info.txt \
            --exclude "*.tmp" --exclude "*.log" 2>/dev/null || \
          tar -czvf "../${ARCHIVE_NAME}.tar.gz" \
            extracted/ dtb_files/ dts_files/ analysis_results/ build_configs/ device_info.txt 2>/dev/null

          zip -r ../dts_files_only.zip dts_files/ analysis_results/00_MASTER_REPORT.md 2>/dev/null || \
          zip -r ../dts_files_only.zip analysis_results/ 2>/dev/null || true

          ls -lh ../*.zip ../*.tar.gz 2>/dev/null || echo "No archive files created"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: device-tree-analysis-${{ github.run_id }}
          path: |
            device_tree_analysis_*.zip
            device_tree_analysis_*.tar.gz
            dts_files_only.zip
          retention-days: 30
          if-no-files-found: warn

      - name: Send Telegram Notification
        if: always()
        env:
          TG_TOKEN: ${{ github.event.inputs.telegram_bot_token || secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ github.event.inputs.telegram_chat_id || secrets.TELEGRAM_CHAT_ID }}
          DEVICE_CODENAME: ${{ github.event.inputs.device_codename || 'unknown' }}
          AI_MODEL: ${{ github.event.inputs.ai_model }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
          JOB_STATUS: ${{ job.status }}
          DTB_COUNT: ${{ steps.extract.outputs.dtb_count }}
          DTS_COUNT: ${{ steps.convert.outputs.dts_count }}
          FILE_SIZE: ${{ steps.download.outputs.file_size }}
        run: |
          if [ -z "$TG_TOKEN" ] || [ -z "$TG_CHAT_ID" ]; then
            echo "Telegram not configured, skipping notification."
            exit 0
          fi

          SUMMARY_TEXT=""
          if [ -f firmware_output/summary_report.txt ]; then
            SUMMARY_TEXT=$(head -n 15 firmware_output/summary_report.txt)
          fi

          export SUMMARY_TEXT
          python3 << 'PYEOF'
          import os, json, urllib.request

          token     = os.environ.get('TG_TOKEN', '')
          chat_id   = os.environ.get('TG_CHAT_ID', '')
          device    = os.environ.get('DEVICE_CODENAME', 'unknown')
          model     = os.environ.get('AI_MODEL', '-')
          run_id    = os.environ.get('RUN_ID', '')
          repo      = os.environ.get('REPO', '')
          status    = os.environ.get('JOB_STATUS', 'unknown')
          dtb       = os.environ.get('DTB_COUNT', '0')
          dts       = os.environ.get('DTS_COUNT', '0')
          summary   = os.environ.get('SUMMARY_TEXT', '')

          try:
              size = f"{int(os.environ.get('FILE_SIZE', '0')):,}"
          except Exception:
              size = os.environ.get('FILE_SIZE', '0')

          icon = {'success': '\u2705', 'failure': '\u274c'}.get(status, '\u26a0\ufe0f')
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"

          lines = [
              f"{icon} *Firmware Device Tree Extractor*",
              "",
              f"\U0001f4f1 *Device:* `{device}`",
              f"\U0001f916 *AI Model:* {model}",
              f"\U0001f4e6 *Firmware Size:* {size} bytes",
              f"\U0001f527 *DTB Files:* {dtb}",
              f"\U0001f4c4 *DTS Files:* {dts}",
              f"\U0001f4ca *Status:* {status.upper()}",
          ]

          if summary.strip():
              trimmed = summary.strip()[:600]
              lines += ["", "\U0001f4cb *AI Summary:*", f"```\n{trimmed}\n```"]

          lines += ["", f"\U0001f517 [Lihat Run & Download Artifacts]({run_url})"]

          text = "\n".join(lines)

          payload = json.dumps({
              "chat_id": chat_id,
              "text": text,
              "parse_mode": "Markdown",
              "disable_web_page_preview": True
          }).encode("utf-8")

          url = f"https://api.telegram.org/bot{token}/sendMessage"
          req = urllib.request.Request(
              url, data=payload,
              headers={"Content-Type": "application/json"}
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  result = json.loads(resp.read())
                  if result.get("ok"):
                      print("Telegram notification sent successfully")
                  else:
                      print(f"Telegram API error: {result.get('description', result)}")
          except Exception as e:
              print(f"Failed to send Telegram notification: {e}")
          PYEOF

      - name: Create Release Summary
        if: always()
        run: |
          echo "## Device Tree Analysis Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Firmware Size | ${{ steps.download.outputs.file_size }} bytes |" >> $GITHUB_STEP_SUMMARY
          echo "| URL Extension | ${{ steps.download.outputs.url_extension }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DTB Files Found | ${{ steps.extract.outputs.dtb_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DTS Files Generated | ${{ steps.convert.outputs.dts_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AI Model Used | ${{ github.event.inputs.ai_model }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Check the Artifacts section below to download the complete analysis." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Important Notes" >> $GITHUB_STEP_SUMMARY
          echo "- Review AI analysis for accuracy before using for custom ROM development" >> $GITHUB_STEP_SUMMARY
          echo "- Verify bootloader unlock status independently" >> $GITHUB_STEP_SUMMARY
          echo "- Check OEM kernel source availability for GPL compliance" >> $GITHUB_STEP_SUMMARY
